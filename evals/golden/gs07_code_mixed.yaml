    name: Tanglish plot query
    category: code-mixed
    subsystem: intent/translit
    query: oru police officer-a paathi kudumbathukaaga case-a maathura padam
    query_lang: ta-latin
    expected:
      canonical_work: Drishyam
      canonical_year: 2013
      versions:
        - {title: Papanasam, language: ta, year: 2015, relationship: is_remake_of}
        - {title: Drishyam, language: ml, year: 2013, is_original: true, relationship: is_original_of}
    gating_metric: intent/slot accuracy (QLoRA must beat base)
    must_not:
      - fail to parse because the query is romanized
    verify_source: [Q18129183, Q15401703]
    expected_intent: find_by_plot
    expected_slots:
      plot_description: family covers up a case to protect themselves from a police officer
    expected_tool_calls:
      - tool: search_by_plot
        arguments:
          description: family covers up a case to protect themselves from a police officer
          top_k: 10
      - tool: get_versions
        arguments:
          work_id: $work_id
          scope: indian
