# Carries expected_tool_calls validated against TOOL_SCHEMA v0 (frozen task 15) and, since
# P3 task 4, expected_intent/expected_slots labels from the frozen taxonomy
# (evals/prompts/intent_taxonomy_v1.json). Placeholders ($work_id) are bound at runtime;
# P4 synthetic data and the tool-call/intent/slot-accuracy metrics use these sequences.
# Expanded P3 task 4 (Q1 confirmed: GS-07 -> 5): c Kanglish, d Tenglish, e native script.
# Expanded P7 task 15 (DEC-P7-4: GS-07 -> 10): f Manglish plot, g Hinglish title+year,
# h Tanglish collision (disambiguate), i Tenglish franchise, j native Devanagari.
# P7 fixtures are ADDITIVE and unscored until the DEC-P7-7 capture window; frozen
# Table 2 runs are never re-scored against them.
fixtures:
  - id: GS-07a
    name: Tanglish plot query
    category: code-mixed
    subsystem: intent/translit
    query: oru police officer-a paathi kudumbathukaaga case-a maathura padam
    query_lang: ta-latin
    expected:
      canonical_work: Drishyam
      canonical_year: 2013
      versions:
        - {title: Papanasam, language: ta, year: 2015, relationship: is_remake_of}
        - {title: Drishyam, language: ml, year: 2013, is_original: true, relationship: is_original_of}
    gating_metric: intent/slot accuracy (QLoRA must beat base)
    must_not:
      - fail to parse because the query is romanized
    verify_source: [Q18129183, Q15401703]
    expected_intent: find_by_plot
    expected_slots:
      plot_description: family covers up a case to protect themselves from a police officer
    expected_tool_calls:
      - tool: search_by_plot
        arguments:
          description: family covers up a case to protect themselves from a police officer
          top_k: 10
      - tool: get_versions
        arguments:
          work_id: $work_id
          scope: indian
