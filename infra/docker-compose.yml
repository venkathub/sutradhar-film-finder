# Sutradhar — local development stack (P0 task 4).
# Postgres (+pgvector) and Redis, healthchecked. Driven by the repo-root `.env`
# (the same POSTGRES_*/REDIS values src/sutradhar/config reads); inline defaults
# let it run without one. No schema here — the Work/Version schema is P1.
#
#   docker compose -f infra/docker-compose.yml up -d --wait
#   docker compose -f infra/docker-compose.yml down          # add -v to drop the volume

name: sutradhar

services:
  postgres:
    # Pinned, multi-arch pgvector image (verified on Docker Hub 2026-07-01; P0_SPEC §2.7).
    image: pgvector/pgvector:0.8.4-pg17
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sutradhar}
      POSTGRES_USER: ${POSTGRES_USER:-sutradhar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sutradhar}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sutradhar} -d ${POSTGRES_DB:-sutradhar}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    # P6 task 8 (DEC-P6-5): API + built UI in ONE image. Profile-gated so plain
    # `make up` stays two-container on the low-spec laptop; `make demo-up` starts it.
    # GPU endpoints pass through from the environment and are EMPTY by default —
    # off is the first-class state; `make gpu-serve` exports flip it live, no rebuild.
    profiles: ["demo"]
    build:
      context: ..
      dockerfile: infra/app/Dockerfile
    env_file:
      - ../.env
    environment:
      # In-network hosts override the .env laptop values.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:8000/v1}
      LLM_MODEL: ${LLM_MODEL:-google/gemma-4-E4B-it}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RETRIEVAL_RUN: ${RETRIEVAL_RUN:-}
      GENERATION_RUN: ${GENERATION_RUN:-}
      DEMO_VIDEO_URL: ${DEMO_VIDEO_URL:-}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"
      interval: 5s
      timeout: 15s
      retries: 20
      start_period: 10s

  mlflow:
    # Self-hosted MLflow tracking server + model registry (P3, DEC-P3-2 option A):
    # backend store = a separate `mlflow` database in the same Postgres (created
    # idempotently by `make mlflow-up`), artifacts under ../data/mlflow-artifacts/.
    # Profile-gated so plain `make up` stays two-container on the low-spec laptop.
    profiles: ["mlflow"]
    build: ./mlflow
    command:
      - mlflow
      - server
      - --backend-store-uri
      - postgresql://${POSTGRES_USER:-sutradhar}:${POSTGRES_PASSWORD:-sutradhar}@postgres:5432/mlflow
      - --artifacts-destination
      - /mlflow-artifacts
      - --serve-artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - ../data/mlflow-artifacts:/mlflow-artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  pgdata:
