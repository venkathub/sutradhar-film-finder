# Tier-1 CI — runs on every PR/push. No GPU, no model calls, no secrets required to pass.
# Mirrors the local `make` targets; uses `uv sync --frozen` for a reproducible environment.
name: tier-1

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint · type · unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (mypy, strict)
        run: uv run mypy src
      - name: Unit tests (integration excluded)
        run: uv run pytest

  integration:
    name: compose stack (Postgres+pgvector, Redis) + UI E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/app/package-lock.json
      - name: Seed .env from template
        run: cp .env.example .env
      - name: Bring up the stack
        run: docker compose -f infra/docker-compose.yml up -d --wait
      - name: Integration tests
        run: uv run pytest -m integration
      - name: Build the UI
        run: |
          npm ci
          npm run build
        working-directory: ui/app
      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps
        working-directory: ui/app
      - name: UI E2E (seven named golden regressions on the rendered DOM)
        run: npx playwright test
        working-directory: ui/app
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  ui:
    name: ui · label drift · build · component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # Active LTS (DEC-P6-1/Q3); build-time only, never deployed
          cache: npm
          cache-dependency-path: ui/app/package-lock.json
      - name: Install pinned UI toolchain
        run: npm ci
        working-directory: ui/app
      - name: Tool-label map drift gate (byte-derived from tool_schema.v0.json)
        run: |
          python3 ui/app/scripts/gen_tool_labels.py
          git diff --exit-code ui/app/src/generated/tool_labels.json
      - name: Type-check + build
        run: npm run build
        working-directory: ui/app
      - name: Install Playwright chromium (Vitest Browser Mode; reused by E2E)
        run: npx playwright install chromium --with-deps
        working-directory: ui/app
      - name: Component tests (Vitest 4 Browser Mode)
        run: npm test
        working-directory: ui/app

  demo-smoke:
    name: fresh-clone demo (make demo-up)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: One-command bring-up from a fresh checkout (zero GPU, zero secrets)
        run: make demo-up
      - name: Smoke the zero-GPU surface
        run: |
          curl -sf localhost:8080/api/health | grep -q '"api"'
          curl -sf localhost:8080/ | grep -q "Sutradhar"
          curl -sf localhost:8080/api/replay/GS-08a | grep -q '"turns"'
          # GPU off is a structured 200, never a 5xx (DEC-P0-4 at the API layer).
          curl -sf -X POST localhost:8080/api/chat \
            -H 'content-type: application/json' \
            -d '{"message":"papanasam?"}' | grep -q '"status": *"off"\|"status":"off"'
      - name: Image hardening assertions (P7 task 5 — non-root USER + HEALTHCHECK)
        run: |
          image_id=$(docker compose -f infra/docker-compose.yml images -q app)
          test -n "$image_id"
          user=$(docker inspect --format '{{.Config.User}}' "$image_id")
          echo "image user: ${user:-<empty>}"
          test -n "$user" && test "$user" != "root" && test "$user" != "0"
          docker inspect --format '{{.Config.Healthcheck.Test}}' "$image_id" | grep -q "api/health"
      - name: Tear down
        if: always()
        run: make demo-down

  secret-guard:
    name: secret guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: .env must not be tracked
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env is tracked — it must stay git-ignored"; exit 1
          fi
          echo ".env is not tracked (ok)"
      - name: No secret literals committed
        run: |
          # HF tokens, private-key headers. .env.example carries only blank secrets.
          if git grep -nE 'hf_[A-Za-z0-9]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----' -- . ':!*.lock'; then
            echo "::error::possible secret literal committed"; exit 1
          fi
          echo "no secret literals found (ok)"

  hf-auth:
    name: hf whoami (optional)
    runs-on: ubuntu-latest
    # Skipped (not failed) when the repo/org secret HF_TOKEN is not configured.
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked environment
        run: uv sync --frozen
      - name: HF whoami
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN secret not set — skipping HF auth check"; exit 0
          fi
          make hf-check
