# Sutradhar P1 seed slice (P1_SPEC §2.7, resolved §7 Q1) — the vertical slice every golden
# scenario stands on. ~30 records: every flagship chain + distractor noise floor.
#
# Ground truth curated 2026-07-02: QIDs confirmed against live Wikidata (wbsearchentities +
# wbgetentities; evidence = description, P577 publication date, P364 original language, director).
# Every row remains a CLAIM to re-verify during ingestion (GOLDEN_SET_SCENARIOS.md data-accuracy
# note); disagreements go to the conflicts queue, never silently resolved.
#
# Modelling notes (P1_SPEC §2.2/§2.7):
# - `relationship.of` records the PROXIMATE source (Chandramukhi -> Apthamitra, not the ml
#   original); the Work groups the whole lineage and derives the ultimate original.
# - Bilingual originals are ONE Wikidata item but TWO version rows; the QID sits on the primary
#   original because version.wikidata_qid is UNIQUE (Baahubali te carries Q13897247, ta carries
#   none).
# - The `backlog` list holds reported-but-unconfirmed versions (§7 Q1 conditional adds): no clean
#   structured record on 2026-07-02, so they are NOT versions and NOT in any coverage denominator.
#   Never hand-invented.

