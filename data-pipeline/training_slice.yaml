# Sutradhar P4 TRAINING SLICE (P4_SPEC §3 D3, DEC-P4-3) — entity-disjoint franchises the
# QLoRA training data is scaffolded from. NEVER a golden fixture source; NEVER added to the
# P2 chunk index or any retrieval fixture (Table 1 stays byte-identical).
#
# Structural exclusion rule (test-enforced BEFORE ingestion by
# tests/test_ft_training_slice_disjoint.py): every title below is outside the
# rapidfuzz-0.80 radius of (a) all golden-slice titles, (b) all GS-02 negative surfaces,
# (c) all held-out negative titles (evals/negatives/heldout.yaml), and (d) the frozen
# exemplar-franchise titles (Ghajini, Okkadu, Ghilli, Interstellar).
#
# Ground truth curated 2026-07-03: every QID verified against live Wikidata
# (wbsearchentities + wbgetentities; evidence = en label, P31=Q11424, P577 year, P364
# original language; structured P144 edges noted per row). Every row remains a CLAIM
# re-verified during ingestion; disagreements go to the conflicts queue.
#
# Modelling notes (same conventions as seed_slice.yaml):
# - Dubs (Aparichitudu, Adirindhi, Whistle) have NO separate Wikidata items — version rows
#   without QIDs (Baahubali convention); their titles verify via TMDB/IMDb AKA rows.
# - Bilingual originals/remakes are ONE Wikidata item but TWO version rows; the QID sits on
#   the primary row (U Turn 2018 te carries Q56275026, ta carries none).
# - `backlog` = reported-but-unconfirmed versions; no QIDs, no denominators, never invented.

