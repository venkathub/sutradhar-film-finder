  verified_at: "2026-07-03"
  description: >
    P4 training slice (D3): ~11 non-golden remake/dub/sequel/collision franchises for
    QLoRA training-data scaffolds. Entity-disjoint from every golden fixture, negative
    surface, and prompt exemplar (test-enforced). Remake chains (Vikramarkudu, Pokiri,
    Bodyguard, Arjun Reddy, U Turn, Premam, Ala Vaikunthapurramloo), dub tracks (Anniyan,
    Mersal, Bigil), a sequel ladder (Muni/Kanchana), and a same-title collision pair
    (Don 1978/2006 vs Don 2022) for disambiguate scaffolds.

