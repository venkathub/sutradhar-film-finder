[project]
name = "sutradhar"
version = "0.0.0"
description = "Sutradhar — multilingual assistant that finds Indian films from story/plot/cast, remake- and dub-aware."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Sutradhar" }]
# Runtime dependencies are added by the tasks that introduce them (config/serving/hf),
# keeping each P0 commit small and focused. Task 1 ships only the importable package.
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.2",
    "ruff>=0.6",
    "mypy>=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sutradhar"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py312"

[tool.ruff.lint]
# pycodestyle, Pyflakes, isort, pep8-naming, pyupgrade, flake8-bugbear
select = ["E", "F", "I", "N", "UP", "B"]

[tool.mypy]
python_version = "3.12"
files = ["src"]
strict = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
