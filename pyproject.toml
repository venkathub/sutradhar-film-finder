[project]
name = "sutradhar"
version = "0.0.0"
description = "Sutradhar — multilingual assistant that finds Indian films from story/plot/cast, remake- and dub-aware."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Sutradhar" }]
# Runtime dependencies are added by the tasks that introduce them (config/serving/hf),
# keeping each P0 commit small and focused.
dependencies = [
    "pydantic-settings>=2.4",
    "openai>=1.40",
]

[dependency-groups]
dev = [
    "pytest>=8.2",
    "ruff>=0.6",
    "mypy>=1.11",
    # Integration-test clients for the local compose stack (not runtime deps).
    "psycopg[binary]>=3.2",
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sutradhar"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py312"

[tool.ruff.lint]
# pycodestyle, Pyflakes, isort, pep8-naming, pyupgrade, flake8-bugbear
select = ["E", "F", "I", "N", "UP", "B"]

[tool.mypy]
python_version = "3.12"
files = ["src"]
strict = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
# Integration tests (compose stack) are opt-in; unit CI stays hermetic and Docker-free.
addopts = "-q -m 'not integration'"
markers = [
    "integration: tests that require the local docker-compose stack (Postgres+Redis)",
]
